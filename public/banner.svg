<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="35%" style="stop-color:#312e81"/>
      <stop offset="65%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#581c87"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="200" cy="80" r="120" fill="#6366f1" opacity="0.15" filter="url(#blur1)"/>
  <circle cx="950" cy="220" r="100" fill="#a855f7" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="600" cy="150" r="80" fill="#818cf8" opacity="0.08" filter="url(#blur2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Wallet icon -->
  <g transform="translate(105, 95)">
    <rect x="0" y="8" width="44" height="34" rx="6" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M6 8V6a6 6 0 0 1 6-6h20a6 6 0 0 1 6 6v2" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="33" cy="25" r="3" fill="url(#accent)"/>
  </g>

  <!-- Title -->
  <text x="165" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">FinTrack</text>

  <!-- Tagline -->
  <text x="165" y="165" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#a5b4fc" font-weight="500" letter-spacing="0.5">AI-Powered Personal Finance Intelligence</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">
    <!-- Intelligence -->
    <rect x="165" y="190" width="100" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="189" y="207" fill="#c7d2fe">🧠 Intelligence</text>

    <!-- PDF Import -->
    <rect x="278" y="190" width="96" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="298" y="207" fill="#c7d2fe">📄 PDF Import</text>

    <!-- i18n -->
    <rect x="387" y="190" width="78" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="405" y="207" fill="#c7d2fe">🌐 EN/FR</text>

    <!-- OLED Dark -->
    <rect x="478" y="190" width="96" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="496" y="207" fill="#c7d2fe">🌑 OLED Dark</text>

    <!-- Self-Hosted -->
    <rect x="587" y="190" width="102" height="26" rx="13" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="604" y="207" fill="#c7d2fe">🔒 Self-Hosted</text>
  </g>

  <!-- Right side: mini dashboard mockup -->
  <g transform="translate(780, 40)">
    <!-- Card background -->
    <rect width="360" height="220" rx="16" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Inner cards row -->
    <g transform="translate(16, 16)">
      <rect width="76" height="44" rx="8" fill="white" fill-opacity="0.05"/>
      <text x="10" y="18" font-family="system-ui" font-size="7" fill="#a5b4fc" font-weight="600">NET WORTH</text>
      <text x="10" y="35" font-family="system-ui" font-size="14" fill="#e0e7ff" font-weight="700">$24.8k</text>

      <rect x="84" width="76" height="44" rx="8" fill="white" fill-opacity="0.05"/>
      <text x="94" y="18" font-family="system-ui" font-size="7" fill="#a5b4fc" font-weight="600">INCOME</text>
      <text x="94" y="35" font-family="system-ui" font-size="14" fill="#34d399" font-weight="700">$8,430</text>

      <rect x="168" width="76" height="44" rx="8" fill="white" fill-opacity="0.05"/>
      <text x="178" y="18" font-family="system-ui" font-size="7" fill="#a5b4fc" font-weight="600">EXPENSES</text>
      <text x="178" y="35" font-family="system-ui" font-size="14" fill="#f87171" font-weight="700">$3,219</text>

      <rect x="252" width="76" height="44" rx="8" fill="white" fill-opacity="0.05"/>
      <text x="262" y="18" font-family="system-ui" font-size="7" fill="#a5b4fc" font-weight="600">HEALTH</text>
      <text x="262" y="35" font-family="system-ui" font-size="16" fill="#34d399" font-weight="800">A+</text>
    </g>

    <!-- Mini chart -->
    <g transform="translate(16, 72)">
      <rect width="220" height="132" rx="8" fill="white" fill-opacity="0.03"/>
      <polyline points="10,110 30,90 50,95 70,70 90,75 110,50 130,55 150,30 170,40 190,20 210,25"
        fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.2"/>
        <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
      </linearGradient>
      <polygon points="10,110 30,90 50,95 70,70 90,75 110,50 130,55 150,30 170,40 190,20 210,25 210,120 10,120"
        fill="url(#chartFill)"/>
    </g>

    <!-- Health gauge -->
    <g transform="translate(290, 115)">
      <circle cx="28" cy="28" r="24" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="4"/>
      <circle cx="28" cy="28" r="24" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="120" stroke-dashoffset="30" transform="rotate(-90, 28, 28)"/>
      <text x="28" y="32" font-family="system-ui" font-size="14" fill="#34d399" font-weight="800" text-anchor="middle">85</text>
    </g>

    <!-- AI insight card -->
    <g transform="translate(244, 72)">
      <rect width="100" height="36" rx="6" fill="white" fill-opacity="0.05"/>
      <text x="8" y="14" font-family="system-ui" font-size="6" fill="#a5b4fc" font-weight="600">AI INSIGHT</text>
      <text x="8" y="26" font-family="system-ui" font-size="7" fill="#c7d2fe">Save $320/mo on</text>
      <text x="8" y="34" font-family="system-ui" font-size="7" fill="#c7d2fe">subscriptions</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
