services:
  fintrack:
    build: .
    container_name: fintrack
    expose:
      - "3000"
    volumes:
      - fintrack-data:/app/data
    environment:
      - NODE_ENV=production
      # Auto-generated if not set — set these for consistent sessions across rebuilds
      # - JWT_SECRET=your-secret-here
      # - ENCRYPTION_KEY=your-encryption-key-here

      # Optional: Ollama URL for local AI (use host.docker.internal on Mac/Windows)
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fintrack-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - fintrack
    restart: unless-stopped

  # Optional: Uncomment to run Ollama alongside the app
  # ollama:
  #   image: ollama/ollama
  #   container_name: fintrack-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped

volumes:
  fintrack-data:
  # ollama-data:
