services:
  fintrack:
    build: .
    container_name: fintrack
    expose:
      - "3000"
    volumes:
      - fintrack-data:/app/data
    environment:
      - NODE_ENV=production
      # Auto-generated if not set — set these for consistent sessions across rebuilds
      # - JWT_SECRET=your-secret-here
      # - ENCRYPTION_KEY=your-encryption-key-here

      # Ollama AI connection (uses the ollama service below)
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fintrack-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - fintrack
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: fintrack-ollama
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    entrypoint: ["/ollama-entrypoint.sh"]
    restart: unless-stopped

volumes:
  fintrack-data:
  ollama-data:
